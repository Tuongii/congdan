<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Cổng tiếp công dân trực tuyến trực thuộc Quân đội. Hỗ trợ giải quyết khiếu nại, tố cáo, kiến nghị nhanh chóng, bảo mật.">

    <meta name="keywords" content="tiếp công dân, quân đội, trực tuyến, khiếu nại, kiến nghị">

    <title>Cổng Tiếp Công Dân Trực Tuyến - Quân Đội Nhân Dân</title>

    

    <style>

        :root {

            --military-green: #2C5E1A;

            --light-green: #E8F5E9;

            --gold: #FFC107;

            --text-dark: #333;

        }

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background-color: #f4f7f6;

            color: var(--text-dark);

            line-height: 1.6;

            margin: 0;

            padding: 0;

        }

        header {

            background-color: var(--military-green);

            color: white;

            text-align: center;

            padding: 1.5rem 0;

            border-bottom: 4px solid var(--gold);

        }

        .container {

            max-width: 800px;

            margin: 20px auto;

            background: white;

            padding: 20px 30px;

            border-radius: 8px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        }

        .form-group {

            margin-bottom: 15px;

        }

        label {

            display: block;

            font-weight: bold;

            margin-bottom: 5px;

            color: var(--military-green);

        }

        input, select, textarea {

            width: 100%;

            padding: 10px;

            border: 1px solid #ccc;

            border-radius: 4px;

            box-sizing: border-box;

        }

        button {

            background-color: var(--military-green);

            color: white;

            border: none;

            padding: 12px 20px;

            font-size: 16px;

            border-radius: 4px;

            cursor: pointer;

            width: 100%;

            font-weight: bold;

        }

        button:hover {

            background-color: #1e4012;

        }

        .contact-section {

            margin-top: 30px;

            padding-top: 20px;

            border-top: 1px solid #eee;

            display: flex;

            justify-content: space-between;

            align-items: center;

        }

        .contact-btn {

            padding: 10px 15px;

            border-radius: 4px;

            text-decoration: none;

            color: white;

            font-weight: bold;

            display: inline-block;

        }

        .btn-zalo { background-color: #0068FF; }

        .btn-phone { background-color: #e53935; }

        .btn-video { background-color: var(--gold); color: #333; }

        

        /* Chứa Iframe Gọi Video */

        #video-container {

display: none;

            margin-top: 20px;

            height: 500px;

            width: 100%;

            border: 2px solid var(--military-green);

        }

    </style>

</head>

<body>



<header>

    <h1>CỔNG TIẾP CÔNG DÂN TRỰC TUYẾN</h1>

    <p>Nhanh chóng - Minh bạch - Bảo mật</p>

</header>



<div class="container">

    <h2>Gửi Yêu Cầu / Kiến Nghị</h2>

    <form id="citizenForm">

        <div class="form-group">

            <label for="fullName">Họ và tên (*)</label>

            <input type="text" id="fullName" name="fullName" required>

        </div>



        <div class="form-group">

            <label for="dob">Ngày tháng năm sinh (*)</label>

            <input type="date" id="dob" name="dob" required>

        </div>



        <div class="form-group">

            <label for="occupation">Nghề nghiệp hiện tại (*)</label>

            <input type="text" id="occupation" name="occupation" required>

        </div>



        <div class="form-group">

            <label for="hometown-province">Quê quán (Tỉnh/Thành phố) (*)</label>

            <select id="hometown-province" name="hometownProvince" required>

                <option value="">-- Chọn Tỉnh/Thành phố --</option>

                <!-- Dữ liệu sẽ được load qua JS -->

            </select>

        </div>



        <div class="form-group">

            <label for="current-province">Nơi ở hiện tại (Tỉnh/Thành phố) (*)</label>

            <select id="current-province" name="currentProvince" required>

                <option value="">-- Chọn Tỉnh/Thành phố --</option>

                <!-- Dữ liệu sẽ được load qua JS -->

            </select>

        </div>



        <div class="form-group">

            <label for="partyDate">Ngày vào Đảng (Nếu có)</label>

            <input type="date" id="partyDate" name="partyDate">

        </div>



        <div class="form-group">

            <label for="issue">Vấn đề cần xử lý (*)</label>

            <textarea id="issue" name="issue" rows="5" required placeholder="Trình bày rõ nội dung cần giải quyết..."></textarea>

        </div>



        <button type="submit">Gửi Thông Tin An Toàn</button>

    </form>



    <div class="contact-section">

        <div>

            <p><strong>Liên hệ Quản lý:</strong></p>

            <a href="tel:0987654321" class="contact-btn btn-phone">📞 Gọi Hotline</a>

            <a href="https://zalo.me/0987654321" target="_blank" class="contact-btn btn-zalo">💬 Chat Zalo</a>

        </div>

        <div>

            <p><strong>Trao đổi trực tiếp:</strong></p>

            <button class="contact-btn btn-video" onclick="startVideoCall()">📹 Gọi Video Trực Tuyến</button>

        </div>

    </div>



    <!-- Khu vực hiển thị Video Call -->

    <div id="video-container"></div>

</div>



<!-- Thư viện Jitsi Meet cho chức năng Video Call -->

<script src="https://meet.jit.si/external_api.js"></script>

<script>

// 1. Tích hợp API Hành chính Việt Nam (Tỉnh/Thành)

    document.addEventListener("DOMContentLoaded", async () => {

        try {

            const response = await fetch('https://provinces.open-api.vn/api/p/');

            const provinces = await response.json();

            const homeSelect = document.getElementById('hometown-province');

            const currentSelect = document.getElementById('current-province');

            

            provinces.forEach(p => {

                let option1 = new Option(p.name, p.code);

                let option2 = new Option(p.name, p.code);

                homeSelect.add(option1);

                currentSelect.add(option2);

            });

        } catch (error) {

            console.error("Không tải được dữ liệu Tỉnh/Thành:", error);

        }

    });



    // 2. Xử lý gửi Form an toàn (Mô phỏng gửi lên Server)

    document.getElementById('citizenForm').addEventListener('submit', async function(e) {

        e.preventDefault();

        

        // Thu thập dữ liệu

        const formData = {

            fullName: document.getElementById('fullName').value,

            dob: document.getElementById('dob').value,

            occupation: document.getElementById('occupation').value,

            hometown: document.getElementById('hometown-province').options[document.getElementById('hometown-province').selectedIndex].text,

            currentLocation: document.getElementById('current-province').options[document.getElementById('current-province').selectedIndex].text,

            partyDate: document.getElementById('partyDate').value,

            issue: document.getElementById('issue').value

        };



        try {

            // Gửi dữ liệu qua API (Cần có Backend xử lý)

            // fetch('/api/tiep-cong-dan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(formData) })

            alert('Đã gửi thông tin thành công! Hệ thống đã mã hóa và bảo mật dữ liệu của đồng chí/công dân.');

            this.reset();

        } catch (error) {

            alert('Có lỗi xảy ra, vui lòng thử lại.');

        }

    });



    // 3. Khởi tạo Video Call trực tiếp trên Web (Sử dụng Jitsi Meet API)

    function startVideoCall() {

        const domain = 'meet.jit.si';

        const options = {

            roomName: 'TiepCongDanQuanDoi_' + Math.floor(Math.random() * 10000),

            width: '100%',

            height: '100%',

            parentNode: document.querySelector('#video-container'),

            userInfo: {

                displayName: document.getElementById('fullName').value || 'Công dân'

            }

        };

        document.getElementById('video-container').style.display = 'block';

        const api = new JitsiMeetExternalAPI(domain, options);

    }

</script>



</body>

</html>
